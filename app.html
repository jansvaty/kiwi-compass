<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Find your match | Kiwi Compass</title>
  <meta name="description" content="Answer five quick questions and get a ranked match for 12 Australian cities, with reasoning for every factor.">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/logo.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kiwi Compass">
  <script>
    (function () {
      try {
        if (localStorage.getItem("kc-theme") === "light")
          document.documentElement.dataset.theme = "light";
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="css/style.css?v=19">
</head>
<body>
  <header>
    <a href="index.html" class="brand homelink">
      <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="32" cy="32" r="27" fill="none" style="stroke: var(--accent)" stroke-width="4.5"/>
        <g style="stroke: var(--accent)" stroke-width="2" opacity="0.3">
          <line x1="32" y1="9" x2="32" y2="14"/>
          <line x1="32" y1="50" x2="32" y2="55"/>
          <line x1="9" y1="32" x2="14" y2="32"/>
          <line x1="50" y1="32" x2="55" y2="32"/>
        </g>
        <polygon points="17.9,17.9 36.2,27.8 27.8,36.2" style="fill: var(--accent2)"/>
        <polygon points="46.1,46.1 27.8,36.2 36.2,27.8" style="fill: var(--logo-dim)"/>
        <circle cx="32" cy="32" r="3" style="fill: var(--bg)"/>
      </svg>
      <div>
        <h1>Kiwi <span>Compass</span></h1>
        <p>Find your place across the ditch</p>
      </div>
    </a>
    <button id="theme-toggle" class="theme-toggle" aria-label="Switch to light mode">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a8.5 8.5 0 1 0 11 11z"/></svg>
    </button>
  </header>
  <main id="app">
    <noscript>Kiwi Compass needs JavaScript to run.</noscript>
  </main>
  <script src="js/data.js?v=19"></script>
  <script src="js/scoring.js?v=19"></script>
  <script src="js/app.js?v=19"></script>
  <script src="js/theme.js?v=19"></script>
</body>
</html>
