<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="theme-color" content="#111917" media="(prefers-color-scheme: dark)">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Kiwi Compass">
  <link rel="stylesheet" href="css/style.css">

<body>
  <header>
    <a href="index.html" class="brand homelink">

      <div>
        <h1>Kiwi <span>Compass</span></h1>
        <p>Find your place across the ditch</p>
      </div>
    </a>

  <main id="app">
    <noscript>Kiwi Compass needs JavaScript to run.</noscript>
  </main>
  <script src="js/data.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/app.js"></script>
