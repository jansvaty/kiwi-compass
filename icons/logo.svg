<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kiwi Compass logo">
  <style>
    .ring, .tick { stroke: #346eaa; }
    .front { fill: #e13940; }
    .tail { fill: #9db8d2; }
    .dot { fill: #f7f9fb; }
    @media (prefers-color-scheme: dark) {
      .ring, .tick { stroke: #7fb0e0; }
      .front { fill: #ed5f66; }
      .tail { fill: #4a6076; }
      .dot { fill: #000000; }
    }
  </style>
  <circle class="ring" cx="32" cy="32" r="27" fill="none" stroke-width="4.5"/>
  <g class="tick" stroke-width="2" opacity="0.3">
    <line x1="32" y1="9" x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="55"/>
    <line x1="9" y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="55" y2="32"/>
  </g>
  <polygon class="front" points="17.9,17.9 36.2,27.8 27.8,36.2"/>
  <polygon class="tail" points="46.1,46.1 27.8,36.2 36.2,27.8"/>
  <circle class="dot" cx="32" cy="32" r="3"/>
</svg>
